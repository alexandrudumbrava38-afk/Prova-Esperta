<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Prova Esperta</title>
    <link rel="stylesheet" href="/assets/styles-C3eNr3BJ.css" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Inline debug helper: writes a short message and captures global errors -->
    <script>
      try {
        console.log('inline-debug: index.html loaded');
        const root = document.getElementById('root');
        if (root) root.innerHTML = '<div id="app-debug" style="font-family:system-ui,Arial,sans-serif;padding:24px;color:#333">Loading app... (debug)</div>';
        const showError = (msg) => {
          try {
            const content = '<pre style="white-space:pre-wrap;color:#900;padding:24px">' + String(msg) + '</pre>';
            if (root) {
              root.innerHTML = content;
            } else if (document && document.body) {
              document.body.innerHTML = content;
            }
          } catch (e) {
            console.error('failed to render error to DOM', e);
          }
        };
        window.addEventListener('error', (e) => {
          console.error('window error', e.error || e.message || e);
          showError(e.error?.stack || e.message || e);
        });
        window.addEventListener('unhandledrejection', (ev) => {
          console.error('unhandledrejection', ev.reason);
          showError((ev.reason && (ev.reason.stack || ev.reason.message)) || String(ev.reason));
        });
      } catch (err) {
        console.error('inline-debug failed', err);
      }
    </script>
    <script type="module">
      (async () => {
        try {
          console.log('dynamic-loader: importing bundles');
          // import smaller runtime first (if present)
          await import('/assets/index-Dr18mHGD.js');
          // then import the main app bundle
          await import('/assets/index-D9rqs9iY.js');
          console.log('dynamic-loader: bundles imported');
        } catch (err) {
          console.error('dynamic-loader: import failed', err);
          const root = document.getElementById('root');
          if (root) {
            const msg = (err && (err.stack || err.message)) || String(err);
            root.innerHTML = '<pre style="white-space:pre-wrap;color:#900;padding:24px">Client bundle failed to initialize:\n' + msg + '</pre>';
          } else if (document && document.body) {
            document.body.innerHTML = '<pre style="white-space:pre-wrap;color:#900;padding:24px">Client bundle failed to initialize:\n' + ((err && (err.stack || err.message)) || String(err)) + '</pre>';
          }
        }
      })();
    </script>
  </body>
</html>
